version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: telemedmuk_db
    environment:
      POSTGRES_USER: telemedmuk
      POSTGRES_PASSWORD: telemedmuk_dev
      POSTGRES_DB: telemedmuk
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U telemedmuk']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
